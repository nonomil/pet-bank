version: 1
project:
  name: pet-bank
  type: static-site-with-self-hosted-sqlite-api
  workspaceRoot: .
  primaryBranch: main

frontend:
  publicDir: site
  entryHtml: index.html
  adminEntryHtml: null
  adminStatus: deferred-until-self-hosted-auth
  localServeCommand: node scripts/local-server.mjs
  localBaseUrl: http://127.0.0.1:7000
  deploy:
    provider: github-pages
    workflow: .github/workflows/deploy.yml

selfHostedApi:
  status: primary
  sourceDir: prj/petbank-server
  healthCheck: http://127.0.0.1:3000/api/v1/health
  persistentPaths:
    - /srv/pet-bank/shared/data
    - /srv/pet-bank/shared/backups
    - /srv/pet-bank/shared/server.env
  releaseRoot: /srv/pet-bank/releases
  currentReleaseLink: /srv/pet-bank/current
  deployGuide: docs_project/runbooks/self-hosted/AI-HERMES-DEPLOY.md
  pixelWorldsGuide: docs_project/runbooks/self-hosted/PIXEL-WORLDS-HERMES.md
  automationStatus: implemented-scripted-canary
  deployScript: ops/deploy-self-hosted.sh
  backupScript: ops/backup-sqlite.sh
  restoreScript: ops/restore-sqlite.sh
  requiredSecrets:
    - PETBANK_JWT_SECRET
    - PETBANK_DATA_DIR
    - PETBANK_ALLOWED_ORIGIN
  authorizationCommands:
    issue: ops/issue-registration-code.sh
    list: ops/list-registration-codes.sh
    revoke: ops/revoke-registration-code.sh
  authorizationRules:
    - registration-codes-are-hashed
    - full-code-is-shown-only-on-issue
    - never-put-code-in-git-or-server-env
  rules:
    - never-delete-shared-directory
    - migration-files-are-additive-only
    - backup-before-schema-change
    - health-check-before-current-link-switch

verification:
  commands:
    - node scripts/test-pixel-worlds-contract.mjs
    - node scripts/test-explore-mode-contract.mjs
    - node scripts/test-exploration-entry-browser.mjs
    - node scripts/test-pixel-story-all-chapters-browser.mjs
    - node --test prj/petbank-server/test/*.test.mjs
    - node --test scripts/test-self-hosted-ops.mjs
    - node --check prj/petbank-server/src/server.mjs
    - node --check prj/petbank-server/src/config.mjs

policies:
  migrationStrategy: additive-first
  destructiveMigrationsRequireSeparateRelease: true
  requireBackupBeforeProductionMigration: true
  forbidDatabaseOutsideSharedPath: true

rollback:
  release: switch-current-to-previous-release
  database: restore-from-shared-sqlite-backup-after-stopping-api
