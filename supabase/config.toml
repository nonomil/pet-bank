# Supabase project config skeleton for pet-bank.
# This file is intended to be read by humans, CI, and future automation such as Hermes.
# Fill the real remote project refs before using `supabase config push` in a real environment.

project_id = "pet-bank-local"

[auth]
site_url = "env(APP_SUPABASE_SITE_URL)"
additional_redirect_urls = [
  "http://127.0.0.1:8765",
  "http://127.0.0.1:8765/index.html",
  "http://127.0.0.1:8765/admin.html",
]
enable_signup = true
jwt_expiry = 3600

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[db.seed]
enabled = false
sql_paths = ["./supabase/seed.sql"]

[remotes.staging]
project_id = "your-staging-project-ref"

[remotes.production]
project_id = "your-production-project-ref"

[functions.accept-household-invite]
verify_jwt = true

[functions.claim-registration-invite]
verify_jwt = true

[functions.issue-household-invite]
verify_jwt = true

[functions.issue-pk-match]
verify_jwt = true

[functions.issue-registration-invite]
verify_jwt = true

[functions.list-registration-invites]
verify_jwt = true

[functions.redeem-friend-code]
verify_jwt = true

[functions.revoke-household-invite]
verify_jwt = true

[functions.revoke-registration-invite]
verify_jwt = true

[functions.submit-pk-attempt]
verify_jwt = true

[functions.validate-registration-invite]
verify_jwt = false
