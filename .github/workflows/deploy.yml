name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/configure-pages@v4
      - name: Install asset validation dependencies
        run: python -m pip install --disable-pip-version-check pillow soundfile
      - name: Run Pages fast gate
        run: |
          node scripts/test-pages-fast-gate-contract.mjs
          python scripts/convert-runtime-image-variants.py --check
          python scripts/convert-runtime-audio-variants.py --check
          python scripts/generate-home-image-thumbnails.py --check
          node --check js/app.js
          node scripts/test-initial-media-loading-contract.mjs
          node scripts/test-home-image-thumbnails.mjs
          node scripts/test-pages-vocab-publish-contract.mjs
          node scripts/test-minecraft-vocab-runtime-shards.mjs
          node scripts/test-minecraft-vocab-publish-contract.mjs
          node scripts/test-pixel-story-publish-contract.mjs
          node scripts/test-typing-defense-publish-contract.mjs
          node scripts/test-learning-arcade-publish-contract.mjs
          node scripts/test-learning-arcade-vocab-shards-contract.mjs
          node scripts/test-learning-arcade-lazy-data-contract.mjs
          node scripts/test-pages-artifact-size-audit.mjs
          node scripts/test-measure-page-load.mjs
          node scripts/test-static-route-entries.mjs
          node scripts/test-static-access-policy-contract.mjs
          node prj/runtime_loader_route_base_contract.test.mjs
          node prj/route_aware_shell_contract.test.mjs
          node prj/profile_isolation_journey_simulation.mjs
      - name: Assemble static site artifact
        run: node scripts/assemble-pages-artifact.mjs _site
      - name: Verify learning arcade publish boundary
        run: node scripts/test-learning-arcade-publish-contract.mjs _site
      - name: Verify learning arcade vocab shard boundary
        run: node scripts/test-learning-arcade-vocab-shards-contract.mjs _site
      - name: Verify Minecraft vocab publish boundary
        run: node scripts/test-minecraft-vocab-publish-contract.mjs _site
      - name: Verify pixel story publish boundary
        run: node scripts/test-pixel-story-publish-contract.mjs _site
      - name: Verify typing defense publish boundary
        run: node scripts/test-typing-defense-publish-contract.mjs _site
      - name: Audit assembled artifact budgets
        run: node scripts/audit-pages-artifact-size.mjs _site --top=30 --max-mib=400 --require-manifest-budgets --require-manifest-coverage
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
