<body class="map-page-bg admin-page-bg">
    <main id="admin-root"></main>

    <script src="js/runtime-loader.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', function () {
            if (!window.PetBankRuntime || typeof window.PetBankRuntime.ensureAdminPage !== 'function') return;
            window.PetBankRuntime.ensureAdminPage().catch(function (error) {
                console.error('[admin] runtime boot failed:', error);
            });
        });
    </script>
</body>
