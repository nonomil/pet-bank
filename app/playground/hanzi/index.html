<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在打开汉字挑战...</title>
    <meta http-equiv="refresh" content="0; url=../../../index.html?route=%2Fapp%2Fplayground%2Fhanzi">
    <script>
        (function () {
            var path = window.location.pathname.replace(/\/index\.html$/i, '').replace(/\/+$/g, '') || '/app/playground/hanzi';
            var params = new URLSearchParams(window.location.search);
            params.set('route', path);
            var nextUrl = '../../../index.html';
            var query = params.toString();
            if (query) nextUrl += '?' + query;
            if (window.location.hash) nextUrl += window.location.hash;
            window.location.replace(nextUrl);
        })();
    </script>
</head>
<body>
    <p>正在打开汉字挑战...</p>
</body>
</html>
