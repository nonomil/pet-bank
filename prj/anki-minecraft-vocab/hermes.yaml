version: 1
name: anki-minecraft-vocab
type: standalone-static-site
sourceDir: prj/anki-minecraft-vocab
publicDir: .
localServeCommand: python -m http.server 7001 --bind 127.0.0.1
localBaseUrl: http://127.0.0.1:7001/
deployGuide: docs_project/runbooks/self-hosted/ANKI-MINECRAFT-VOCAB-HERMES.md
pagesArtifact: excluded-by-design
releaseRoot: /srv/pet-bank/anki-minecraft-vocab/releases
currentReleaseLink: /srv/pet-bank/anki-minecraft-vocab/current
persistentData: none
normalizedData:
  schemaVersion: 2
  cardCount: 11241
  deckCount: 231
  sourceMediaCount: 6847
  curatedMediaCount: 4992
  requiredCardContent:
    - word
    - chinese
    - phrase
    - phraseTranslation
    - sentence
    - sentenceTranslation
rebuildCommand: node scripts/normalize-anki-minecraft-vocab.mjs --apply --prune-media && node scripts/fill-missing-card-images.mjs
testCommand: python -m unittest discover -s scripts -p "test_*.py" -v
healthChecks:
  - /index.html
  - /data/manifest.json
  - /data/decks.json
  - /data/cards.json
rules:
  - keep-source-apkg-out-of-git
  - do-not-copy-into-main-pages-root
  - rollback-by-current-symlink
