# Include this file inside the production site server block.
# The server root must be the assembled artifact, never the repository root.
root /srv/pet-bank/current/site;
index index.html;

# Public assets are safe to serve because user state lives in localStorage/API.
location ^~ /js/ { try_files $uri =404; }
location ^~ /css/ { try_files $uri =404; }
location ^~ /assets/ { try_files $uri =404; }
location ^~ /data/ { try_files $uri =404; }
location ^~ /icons/ { try_files $uri =404; }
location = /favicon.ico { try_files $uri =404; }

# Login/register and public experience routes.
location = /parent { try_files $uri $uri/ /index.html; }
location = /parent/ { try_files $uri $uri/ /index.html; }
location = /parent/settings { try_files $uri $uri/ /index.html; }
location = /parent/settings/ { try_files $uri $uri/ /index.html; }
location = /settings { try_files $uri $uri/ /index.html; }
location = /settings/ { try_files $uri $uri/ /index.html; }
location = /parent/settings/family { try_files $uri $uri/ /index.html; }
location ^~ /parent/settings/family/ { try_files $uri $uri/ /index.html; }
location = /parent/settings/account { try_files $uri $uri/ /index.html; }
location ^~ /parent/settings/account/ { try_files $uri $uri/ /index.html; }
location = /settings/family { try_files $uri $uri/ /index.html; }
location ^~ /settings/family/ { try_files $uri $uri/ /index.html; }
location = /settings/account { try_files $uri $uri/ /index.html; }
location ^~ /settings/account/ { try_files $uri $uri/ /index.html; }
location = /app/picturebooks { try_files $uri $uri/ /index.html; }
location ^~ /app/picturebooks/ { try_files $uri $uri/ /index.html; }
location = /picturebooks { try_files $uri $uri/ /index.html; }
location ^~ /picturebooks/ { try_files $uri $uri/ /index.html; }
location = /app/playground { try_files $uri $uri/ /index.html; }
location ^~ /app/playground/ { try_files $uri $uri/ /index.html; }
location = /playground { try_files $uri $uri/ /index.html; }
location ^~ /playground/ { try_files $uri $uri/ /index.html; }

# Standalone playground runtimes are assembled into /prj/ and remain public.
location ^~ /prj/ { try_files $uri $uri/ =404; }

# Protected child application and parent management routes.
location = / {
    auth_request /_petbank_static_auth;
    error_page 401 403 =302 /parent/;
    try_files $uri $uri/ /index.html;
}
location ^~ /settings/ {
    auth_request /_petbank_static_auth;
    error_page 401 403 =302 /parent/;
    try_files $uri $uri/ /index.html;
}
location = /parent/works {
    auth_request /_petbank_static_auth;
    error_page 401 403 =302 /parent/;
    try_files $uri $uri/ /index.html;
}
location ^~ /parent/works/ {
    auth_request /_petbank_static_auth;
    error_page 401 403 =302 /parent/;
    try_files $uri $uri/ /index.html;
}
location = /parent/tools {
    auth_request /_petbank_static_auth;
    error_page 401 403 =302 /parent/;
    try_files $uri $uri/ /index.html;
}
location ^~ /parent/tools/ {
    auth_request /_petbank_static_auth;
    error_page 401 403 =302 /parent/;
    try_files $uri $uri/ /index.html;
}
location ^~ /parent/ {
    auth_request /_petbank_static_auth;
    error_page 401 403 =302 /parent/;
    try_files $uri $uri/ /index.html;
}
location ^~ /app/ {
    auth_request /_petbank_static_auth;
    error_page 401 403 =302 /parent/;
    try_files $uri $uri/ /index.html;
}
location / {
    auth_request /_petbank_static_auth;
    error_page 401 403 =302 /parent/;
    try_files $uri $uri/ /index.html;
}
